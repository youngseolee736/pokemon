<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokémon Generator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-panel">
        <p class="eyebrow">Pokémon Generator</p>
        <h1>Pokémon Generator</h1>
        <p class="subtitle">
          Discover a fresh Pokémon combination every time.
        </p>
        <button id="generateBtn" class="generate-btn">Generate Pokémon</button>
      </section>

      <section class="card-panel">
        <article id="pokemonCard" class="pokemon-card">
          <div class="card-top-row">
            <span id="rarityBadge" class="rarity-badge">⭐</span>
            <span id="regionTag" class="region-tag">Kanto</span>
          </div>

          <div class="portrait-wrap">
            <div id="pokemonGlyph" class="pokemon-glyph">⚡</div>
          </div>

          <h2 id="pokemonName" class="pokemon-name">Pikachu</h2>
          <p id="pokemonType" class="pokemon-type">Electric Type</p>
          <p id="pokemonDescription" class="pokemon-description">
            A Pokémon with quick reflexes and bright energy.
          </p>

          <div class="stats-grid">
            <div class="stat-box">
              <span class="stat-label">HP</span>
              <strong id="statHp">72</strong>
            </div>
            <div class="stat-box">
              <span class="stat-label">Attack</span>
              <strong id="statAttack">68</strong>
            </div>
            <div class="stat-box">
              <span class="stat-label">Defense</span>
              <strong id="statDefense">55</strong>
            </div>
            <div class="stat-box">
              <span class="stat-label">Speed</span>
              <strong id="statSpeed">88</strong>
            </div>
          </div>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
